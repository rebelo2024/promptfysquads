squad:
  name: copy-master
  display_name: "Copy Master"
  version: "2.0.0"
  domain: "Elite copywriting 2.0 — direct response, email, funnels, VSLs, sales letters, offers, brand copy, persuasion psychology, negotiation, pitch, SaaS conversion"
  description: |
    Squad of 33 copywriting agents — 32 legendary masters + 1 orchestrator.
    Enhanced version of Copy Squad with deeper frameworks, real champion examples,
    swipe files, and 10 new specialists covering persuasion psychology, offer
    architecture, SaaS copy, pitch dynamics, and negotiation-based selling.
  keywords: [copywriting, direct response, sales letter, email, VSL, funnel, headline, offer, ad copy, launch, bullets, brand copy, persuasion, psychology, negotiation, pitch, SaaS, conversion]
  entry_agent: copy-master-chief
  created_at: "2026-04-04"

tiers:
  tier_0:
    name: "Orchestration"
    agents: [copy-master-chief]
    purpose: "Triage copywriting requests, route to the right specialist, quality control, multi-agent coordination"
  tier_1a:
    name: "Direct Response Legends"
    agents: [gary-halbert, eugene-schwartz, claude-hopkins, gary-bencivenga, robert-collier, john-carlton, jim-rutz, john-caples, rosser-reeves]
    purpose: "Classic direct response masters — long-form, print, mail, scientific testing, USP"
  tier_1b:
    name: "Modern Copy & Funnels"
    agents: [dan-kennedy, frank-kern, russell-brunson, todd-brown, stefan-georgi, jon-benson, ry-schwartz, sabri-suby, evaldo-albuquerque]
    purpose: "Digital-era copy — VSLs, funnels, webinars, launches, cold traffic, belief-based selling"
  tier_1c:
    name: "Email & Relationship"
    agents: [ben-settle, andre-chaperon, dan-koe]
    purpose: "Email sequences, daily emails, nurture copy, personal brand content"
  tier_1d:
    name: "Offers & Sales Pages"
    agents: [joe-sugarman, david-ogilvy, clayton-makepeace, parris-lampropoulos, david-deutsch, alex-hormozi, joanna-wiebe]
    purpose: "Offer architecture, print ads, financial/health copy, value equation, SaaS conversion, data-driven copy"
  tier_1e:
    name: "Persuasion & Psychology"
    agents: [robert-cialdini, blair-warren, chris-voss, oren-klaff]
    purpose: "Persuasion science, emotional triggers, negotiation psychology, frame control, pitch dynamics"

