# Books & Resources Database: Copy Master Squad
# 35+ essential copywriting, persuasion, and direct response books
# Reference for all agents — maps books to domains and frameworks

books:

  - title: "Breakthrough Advertising"
    author: "Eugene Schwartz"
    year: 1966
    core_teaching: "Market sophistication and awareness levels determine your copy approach — not your product features. The 5 levels of awareness (unaware, problem-aware, solution-aware, product-aware, most-aware) dictate the type of lead, the directness of the promise, and the entire copy structure"
    key_frameworks:
      - "5 Levels of Awareness"
      - "5 Levels of Market Sophistication"
      - "38 Ways to Strengthen Headlines"
      - "Intensification vs. Identification"
      - "Mass Desire Channeling"
    essential_for: [eugene-schwartz, copy-chief, todd-brown, stefan-georgi]

  - title: "The Boron Letters"
    author: "Gary Halbert"
    year: 2013
    core_teaching: "Letters written from prison to his son Bond, teaching the fundamentals of direct response — research, list selection, compelling offers, and the art of writing conversational copy that sells"
    key_frameworks:
      - "A-pile vs. B-pile Mail"
      - "Star-Story-Solution"
      - "The Halbert Index"
      - "List-Offer-Copy Priority"
      - "Grab-by-the-Throat Opening"
    essential_for: [gary-halbert, john-carlton, copy-chief]

  - title: "Scientific Advertising"
    author: "Claude Hopkins"
    year: 1923
    core_teaching: "Advertising is salesmanship in print — every ad should be measured, tested, and optimized based on response. Coupons, samples, and tracking are essential. Opinions are worthless; only results matter"
    key_frameworks:
      - "Reason-Why Advertising"
      - "Test Everything Principle"
      - "Preemptive Claim Strategy"
      - "Coupon Response Tracking"
      - "Service Advertising"
    essential_for: [claude-hopkins, john-caples, rosser-reeves, joanna-wiebe]

  - title: "Tested Advertising Methods"
    author: "John Caples"
    year: 1932
    core_teaching: "Headline testing methodology — how to write, test, and measure headlines scientifically. The first book to bring rigorous testing to copywriting with documented before/after results"
    key_frameworks:
      - "29 Headline Formulas"
      - "Split-Run Testing"
      - "First 50 Words Rule"
      - "Proven Headline Templates"
      - "Direct vs. Indirect Headlines"
    essential_for: [john-caples, claude-hopkins, copy-chief]

  - title: "Reality in Advertising"
    author: "Rosser Reeves"
    year: 1961
    core_teaching: "The Unique Selling Proposition (USP) — every ad must make a specific proposition to the consumer, one the competition cannot or does not offer. Repetition of a single idea penetrates the public consciousness"
    key_frameworks:
      - "USP (Unique Selling Proposition)"
      - "Penetration vs. Usage Pull"
      - "Vampire Creativity (creativity that sucks attention from the message)"
      - "Single Proposition Rule"
    essential_for: [rosser-reeves, david-ogilvy, copy-chief]

  - title: "Influence: The Psychology of Persuasion"
    author: "Robert Cialdini"
    year: 1984
    core_teaching: "Six (later seven) universal principles of persuasion that govern human compliance — reciprocity, commitment/consistency, social proof, authority, liking, scarcity, and unity"
    key_frameworks:
      - "6 Principles of Influence (original)"
      - "7 Principles (with Unity)"
      - "Click-Whirr Response Patterns"
      - "Weapons of Influence"
    essential_for: [robert-cialdini, blair-warren, joe-sugarman, copy-chief]

  - title: "Pre-Suasion"
    author: "Robert Cialdini"
    year: 2016
    core_teaching: "What you do BEFORE delivering your message matters as much as the message itself — priming, framing, and attention channeling determine receptivity"
    key_frameworks:
      - "Pre-Suasion Windows"
      - "Privileged Moments"
      - "Unity Principle"
      - "Attention Channeling"
      - "Association Triggers"
    essential_for: [robert-cialdini, eugene-schwartz, oren-klaff]

  - title: "$100M Offers"
    author: "Alex Hormozi"
    year: 2021
    core_teaching: "How to engineer 'Grand Slam Offers' so good that people feel stupid saying no — using the Value Equation to maximize dream outcome and likelihood while minimizing time delay and effort"
    key_frameworks:
      - "Value Equation"
      - "Grand Slam Offer"
      - "Trim & Stack Method"
      - "Scarcity/Urgency/Bonuses/Guarantee Framework"
      - "Dream Outcome Mapping"
    essential_for: [alex-hormozi, dan-kennedy, russell-brunson]

  - title: "$100M Leads"
    author: "Alex Hormozi"
    year: 2023
    core_teaching: "The four core ways to get customers — warm outreach, cold outreach, content, ads — and how to build lead generation systems that compound over time"
    key_frameworks:
      - "Core Four Lead Generation"
      - "Lead Magnet Framework"
      - "Lead-to-Customer Value Chain"
      - "Advertising Scaling Rules"
      - "100 Primary Offer Framework"
    essential_for: [alex-hormozi, sabri-suby, frank-kern]

  - title: "Sell Like Crazy"
    author: "Sabri Suby"
    year: 2019
    core_teaching: "A step-by-step system for converting cold traffic into customers using a 'Godfather Offer,' HVCO (High Value Content Offer), and a structured selling system"
    key_frameworks:
      - "Godfather Offer Strategy"
      - "HVCO (High Value Content Offer)"
      - "Dream Buyer Persona"
      - "Magic Lantern Technique"
      - "8-Phase Selling System"
    essential_for: [sabri-suby, frank-kern, russell-brunson]

  - title: "Never Split the Difference"
    author: "Chris Voss"
    year: 2016
    core_teaching: "FBI hostage negotiation techniques applied to business — tactical empathy, calibrated questions, labeling, mirroring, and the accusation audit as tools for influence"
    key_frameworks:
      - "Tactical Empathy"
      - "Labeling Emotions"
      - "Mirroring Technique"
      - "Accusation Audit"
      - "Calibrated Questions (How/What)"
      - "That's Right Moment"
      - "Black Swan Theory"
    essential_for: [chris-voss, blair-warren, oren-klaff]

  - title: "Pitch Anything"
    author: "Oren Klaff"
    year: 2011
    core_teaching: "Frame control determines the outcome of every pitch — whoever owns the frame wins. Use neurofinance principles and the STRONG method to pitch ideas, raise capital, and close deals"
    key_frameworks:
      - "STRONG Method"
      - "Frame Control Theory"
      - "Crocodile Brain Theory"
      - "Prize Frame"
      - "Time Frame"
      - "Hookpoint Concept"
    essential_for: [oren-klaff, russell-brunson, alex-hormozi]

  - title: "The 16-Word Sales Letter"
    author: "Evaldo Albuquerque"
    year: 2019
    core_teaching: "Every great sales letter is built on changing ONE false belief. The 16-word framework: the desired outcome is NOT about the false belief — it IS about the new mechanism"
    key_frameworks:
      - "16-Word Framework"
      - "False Belief Identification"
      - "Belief Shift Architecture"
      - "6 Types of Great Leads"
      - "Mechanism Naming"
    essential_for: [evaldo-albuquerque, todd-brown, stefan-georgi, parris-lampropoulos]

  - title: "Great Leads"
    author: "Michael Masterson & John Forde"
    year: 2011
    core_teaching: "Six types of leads for sales letters — each matched to a specific awareness level. The lead is the most important part of any sales piece, determining everything that follows"
    key_frameworks:
      - "6 Lead Types: Offer, Promise, Problem-Solution, Big Secret, Proclamation, Story"
      - "Lead-Awareness Matching Matrix"
      - "Lead Length Guidelines"
      - "Transition Techniques"
    essential_for: [evaldo-albuquerque, stefan-georgi, gary-halbert, copy-chief]

  - title: "The Ultimate Sales Letter"
    author: "Dan Kennedy"
    year: 1990
    core_teaching: "Step-by-step blueprint for writing direct response sales letters — from research through drafting through refinement. Emphasis on understanding the customer before writing a word"
    key_frameworks:
      - "28-Step Sales Letter Formula"
      - "PAS (Problem-Agitate-Solve)"
      - "Damaging Admission Technique"
      - "Intimidating Specificity"
      - "Pile-On Proof"
    essential_for: [dan-kennedy, gary-halbert, john-carlton]

  - title: "DotCom Secrets"
    author: "Russell Brunson"
    year: 2015
    core_teaching: "The science of funnel building — value ladders, traffic temperature, and specific funnel types matched to business models. Every business needs a funnel, and every funnel needs specific copy"
    key_frameworks:
      - "Value Ladder"
      - "Hook-Story-Offer"
      - "Traffic Temperature (hot/warm/cold)"
      - "Attractive Character"
      - "7 Funnel Types"
    essential_for: [russell-brunson, frank-kern, sabri-suby]

  - title: "Expert Secrets"
    author: "Russell Brunson"
    year: 2017
    core_teaching: "How to create a mass movement, become a charismatic leader, and use the Epiphany Bridge to change beliefs. The framework for selling through stories and building a tribe"
    key_frameworks:
      - "Epiphany Bridge"
      - "3 Secrets Framework"
      - "Perfect Webinar"
      - "Stack Slide"
      - "False Belief Patterns"
      - "Mass Movement Blueprint"
    essential_for: [russell-brunson, todd-brown, evaldo-albuquerque]

  - title: "Cashvertising"
    author: "Drew Eric Whitman"
    year: 2008
    core_teaching: "Psychology-based advertising techniques — the 8 Life-Force Desires and 9 Secondary Desires that drive all human behavior and purchasing decisions"
    key_frameworks:
      - "8 Life-Force Desires (LF8)"
      - "9 Secondary Desires"
