  - title: "The Adweek Copywriting Handbook"
    author: "Joe Sugarman"
    year: 2006
    core_teaching: "The Slippery Slide concept — every element of copy has one purpose: to get the next line read. Plus 30 psychological triggers that compel people to buy"
