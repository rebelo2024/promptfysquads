  - title: "The Robert Collier Letter Book"
    author: "Robert Collier"
    year: 1931
    core_teaching: "Enter the conversation already happening in the reader's mind — match their existing thoughts, desires, and emotions before trying to redirect them"
    key_frameworks:
      - "Enter the Conversation"
      - "6 Essentials of Every Letter"
      - "Emotional Appeal Hierarchy"
      - "Picture-Word Technique"
