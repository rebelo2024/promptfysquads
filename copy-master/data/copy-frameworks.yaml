# Copy Frameworks Database: Copy Master Squad
# 25 proven copywriting and persuasion frameworks
# Each with creator, source, detailed steps, use cases, and application examples

frameworks:

  - name: "AIDA"
    creator: "Elias St. Elmo Lewis"
    source: "Advertising principles (1898), popularized by countless copywriters"
    steps:
      - step: "Attention"
        detail: "Open with a pattern interrupt — bold claim, shocking stat, provocative question, or visual disruption that stops the scroll"
      - step: "Interest"
        detail: "Bridge to the reader's world — connect the hook to their specific problem, desire, or situation with empathy and specificity"
      - step: "Desire"
        detail: "Paint the transformation — show the after-state vividly, stack benefits, use social proof, and make the outcome feel inevitable"
      - step: "Action"
        detail: "Single clear CTA with urgency or scarcity — tell them exactly what to do next and why doing it now matters"
    when_to_use: "Universal framework for any short-to-medium copy where you need a simple, proven structure"
    best_for: [ads, landing pages, emails, social posts, product descriptions]
    example_application: "Facebook ad: Hook with surprising stat → connect to audience pain → show product benefits → 'Click to claim your free trial'"

  - name: "PAS"
    creator: "Dan Kennedy (popularized)"
    source: "The Ultimate Sales Letter (1990)"
    steps:
      - step: "Problem"
        detail: "Agitate the specific problem the reader faces — name it, describe what it feels like, make them nod in recognition"
      - step: "Agitate"
        detail: "Twist the knife — show the consequences of NOT solving the problem, the hidden costs, the compounding damage, the emotional toll"
      - step: "Solution"
        detail: "Present your offer as the logical, inevitable answer — transition from pain to relief with a clear mechanism"
    when_to_use: "When the audience is problem-aware but not yet solution-aware. Best for pain-driven markets"
    best_for: [emails, ads, landing pages, social posts, cold outreach]
    example_application: "Email: 'Spending 4 hours/day on manual data entry? → That's 1,000 hours/year you'll never get back → Our automation handles it in 12 minutes'"

  - name: "PASTOR"
    creator: "Ray Edwards"
    source: "How to Write Copy That Sells (2016)"
    steps:
      - step: "Person/Problem"
        detail: "Identify the exact person and their specific problem — use their language, their frustrations, their daily reality"
      - step: "Amplify"
        detail: "Magnify the consequences of inaction — what happens in 6 months, 1 year, 5 years if nothing changes"
      - step: "Story/Solution"
        detail: "Tell the origin story of the solution — how it was discovered, why it works differently, the moment of breakthrough"
      - step: "Transformation"
        detail: "Show before/after contrast — specific, measurable results others have achieved. Testimonials and case studies"
      - step: "Offer"
        detail: "Present the complete offer — what they get, how it's delivered, bonuses, guarantees, the full value stack"
      - step: "Response"
        detail: "Clear call to action with urgency — deadline, limited spots, price increase, bonus expiration"
    when_to_use: "Long-form sales pages and VSLs where you need to take someone from problem to purchase"
    best_for: [sales pages, VSLs, webinar pitches, long-form emails]
    example_application: "Sales page for coaching program: identify struggling entrepreneur → show cost of staying stuck → coach's origin story → client results → program details → enrollment deadline"

  - name: "BAB"
    creator: "Traditional copywriting framework"
    source: "Direct response tradition, popularized by multiple copywriters"
    steps:
      - step: "Before"
        detail: "Paint the current painful reality — what life looks like right now with the problem. Be specific and visceral"
      - step: "After"
        detail: "Paint the desired future state — what life looks like after the solution. Make it tangible, emotional, and desirable"
      - step: "Bridge"
        detail: "Show how your product/service is the bridge between the two states — the mechanism that makes the transformation possible"
    when_to_use: "When you need a simple transformation narrative — works especially well for before/after stories"
    best_for: [emails, social posts, case studies, testimonial frameworks, short landing pages]
    example_application: "Email: 'Last year I was working 80-hour weeks barely making $5K/month → Now I work 25 hours and clear $30K → Here's the system that changed everything'"

  - name: "4 P's"
    creator: "Henry Hoke Sr."
    source: "Direct mail tradition (mid-20th century)"
    steps:
      - step: "Promise"
        detail: "Lead with the biggest, most specific benefit — the primary outcome the reader will achieve"
      - step: "Picture"
        detail: "Paint a vivid mental movie of life after achieving the promise — engage all senses, make it real"
      - step: "Proof"
        detail: "Back the promise with evidence — testimonials, case studies, statistics, demonstrations, credentials, logic"
      - step: "Push"
        detail: "Drive to action with urgency — deadline, scarcity, risk reversal, bonus for fast action"
    when_to_use: "Direct response ads and landing pages where you need a tight, benefit-driven structure"
    best_for: [direct mail, landing pages, print ads, display ads]
    example_application: "Landing page: 'Lose 20 lbs in 90 days → Imagine fitting into your college jeans → 47,000 people have done it → Join today, 60-day money-back guarantee'"

  - name: "RMBC"
    creator: "Stefan Georgi"
    source: "The RMBC Method (VSL training course)"
    steps:
      - step: "Research"
        detail: "Deep market research — read reviews, forums, competitor copy, talk to customers, mine Amazon reviews, study the avatar's language patterns"
      - step: "Mechanism"
        detail: "Identify or create the unique mechanism — the specific thing that makes your solution different and believable. Name it. Own it"
      - step: "Brief"
        detail: "Create a structured brief before writing — big idea, lead type (Schwartz), offer, avatar, objections, proof elements, emotional drivers"
      - step: "Copy"
        detail: "Write the copy following the brief — lead, body, close. Every section has a specific job. The brief prevents wandering"
    when_to_use: "VSLs and long-form sales letters — the systematic approach prevents writer's block and ensures strategic alignment"
    best_for: [VSLs, sales letters, long-form landing pages, advertorials]
    example_application: "Supplement VSL: Research Amazon reviews for pain language → Create 'Cellular Reset Enzyme' mechanism → Brief with Problem-Solution lead → Write 45-min VSL following brief"

  - name: "Star-Story-Solution"
    creator: "Gary Halbert"
    source: "The Gary Halbert Letter / Boron Letters tradition"
    steps:
      - step: "Star"
        detail: "Introduce a relatable character — could be you, a customer, or a fictional everyman. Make the audience see themselves"
      - step: "Story"
        detail: "Tell the character's struggle — the journey, the failures, the frustration, the breakthrough moment. Use vivid details and dialogue"
      - step: "Solution"
        detail: "Reveal the product/service as the turning point in the story — the thing that made the transformation possible"
    when_to_use: "When you want to sell through story rather than direct pitch — ideal for skeptical or ad-fatigued audiences"
    best_for: [emails, advertorials, VSLs, native ads, social content]
    example_application: "Advertorial: 'Meet Sarah, a single mom who was $40K in debt → Her journey through failed budgets and shame → How one app changed her financial life forever'"

  - name: "Hook-Story-Offer"
    creator: "Russell Brunson"
    source: "DotCom Secrets (2015), Expert Secrets (2017)"
    steps:
      - step: "Hook"
        detail: "Grab attention with a bold hook — pattern interrupt, curiosity gap, bold claim, or question that demands an answer"
      - step: "Story"
        detail: "Tell an Epiphany Bridge story — the journey that led to the discovery, making the audience experience the same epiphany"
      - step: "Offer"
        detail: "Present the irresistible offer — the vehicle, the stack, the bonuses, the guarantee, all designed to make saying no feel irrational"
    when_to_use: "Funnels, webinars, and any medium where you need to create an emotional connection before pitching"
    best_for: [webinars, funnels, social media, email sequences, stage presentations]
    example_application: "Webinar: 'What if everything you know about weight loss is wrong? → My story of discovering the truth → Here's the program that embodies this discovery'"

  - name: "Epiphany Bridge"
    creator: "Russell Brunson"
    source: "Expert Secrets (2017)"
    steps:
      - step: "Backstory"
        detail: "Set up the character's world before the discovery — their beliefs, struggles, and the wall they hit"
      - step: "External Journey"
        detail: "Describe the external events — what happened, where they went, what they tried, the sequence of actions"
      - step: "Internal Journey"
        detail: "Describe the emotional and belief transformation — the moment the old belief shattered and the new belief formed"
      - step: "Achievement"
        detail: "Show the result — what became possible once the new belief took hold. The transformation made real"
      - step: "Bridge to Offer"
        detail: "Connect the epiphany to the product — your offer is the vehicle that gives others the same epiphany without the same struggle"
    when_to_use: "When selling information products, coaching, or anything where belief change drives the purchase decision"
    best_for: [webinars, VSLs, book funnels, course sales pages, coaching offers]
    example_application: "Course sales page: 'I believed success required 80-hour weeks → I burned out and lost everything → Then I discovered leverage → Built a $10M business in 20hrs/week → This course gives you the same framework'"

  - name: "Value Equation"
    creator: "Alex Hormozi"
    source: "$100M Offers (2021)"
    steps:
      - step: "Dream Outcome"
        detail: "Maximize the perceived dream outcome — the ideal end result the customer wants. Make it as vivid and desirable as possible"
      - step: "Perceived Likelihood of Achievement"
        detail: "Increase perceived likelihood — guarantees, case studies, demonstrations, social proof, credentials, specificity"
      - step: "Time Delay"
        detail: "Minimize perceived time to result — speed of delivery, quick wins, immediate access, fast-start bonuses"
      - step: "Effort & Sacrifice"
        detail: "Minimize perceived effort required — done-for-you elements, templates, shortcuts, support, step-by-step systems"
    when_to_use: "Offer design and positioning — use to engineer offers that feel disproportionately valuable"
    best_for: [offer creation, pricing strategy, sales pages, pitch decks, proposal writing]
    example_application: "SaaS offer: 'Get 100 qualified leads/month (dream) — guaranteed or your money back (likelihood) — see results in 14 days (speed) — we set everything up for you (effort)'"

  - name: "CLOSER"
    creator: "Alex Hormozi"
    source: "$100M Offers (2021), Gym Launch training"
    steps:
      - step: "Clarify"
        detail: "Clarify why they're here — 'What made you reach out today?' Get them to state their problem and desire"
      - step: "Label"
        detail: "Label the problem — reflect it back with more precision than they stated it. Show you understand at a deeper level"
      - step: "Overview"
        detail: "Overview past experiences — 'What have you tried before? Why didn't it work?' Map their failure pattern"
      - step: "Sell the Vacation"
        detail: "Sell the end result, not the plane ride — paint the destination, not the process. Focus on outcomes"
      - step: "Explain Away Concerns"
        detail: "Handle objections before they arise — 'The three biggest concerns people have are...' Then address each"
      - step: "Reinforce the Decision"
        detail: "Get micro-commitments and reinforce — 'Does this make sense? Can you see how this would work for you?'"
    when_to_use: "Phone sales, sales calls, DM selling, any 1-on-1 or live selling situation"
    best_for: [sales scripts, phone sales, DM sequences, consultation calls, close sequences]
    example_application: "Sales call: 'What brings you here today? → So you're saying X is costing you Y → What have you tried? → Imagine if in 90 days... → Most people worry about Z, here's why...'"

  - name: "Slippery Slide"
    creator: "Joe Sugarman"
    source: "The Adweek Copywriting Handbook (2006)"
    steps:
      - step: "Compelling First Sentence"
        detail: "Make the first sentence so short and intriguing that it compels reading the second sentence. That's its only job"
      - step: "Maintain Momentum"
        detail: "Every sentence's purpose is to get the next sentence read. Use curiosity loops, open patterns, incomplete thoughts"
      - step: "Create Buying Environment"
        detail: "Build psychological triggers throughout — involvement devices, ownership language, future pacing, mental movies"
      - step: "Seed Objections Early"
        detail: "Plant and resolve objections before the reader consciously raises them. Makes the close feel natural"
      - step: "Inevitable Conclusion"
        detail: "By the time they reach the CTA, buying feels like the only logical next step — the slide was frictionless"
    when_to_use: "Any long-form copy where maintaining attention through the entire piece is critical"
    best_for: [sales letters, advertorials, long emails, VSL scripts, magazine ads]
    example_application: "Advertorial: First line is 7 words that create a curiosity gap → Each paragraph ends with an open loop → Objections addressed in the narrative → Purchase feels inevitable"

  - name: "One Sentence Persuasion"
    creator: "Blair Warren"
    source: "The One Sentence Persuasion Course (2013)"
    steps:
      - step: "Encourage Their Dreams"
        detail: "Validate and amplify their aspirations — don't dismiss what they want, show you believe in their vision"
      - step: "Justify Their Failures"
        detail: "Remove blame for past failures — it's not their fault, the old methods/information/system failed them"
      - step: "Allay Their Fears"
        detail: "Address and dissolve specific fears — name the fear, then provide evidence or logic that neutralizes it"
      - step: "Confirm Their Suspicions"
        detail: "Validate what they've always suspected — 'You were right all along that...' Creates instant trust"
      - step: "Throw Rocks at Their Enemies"
        detail: "Identify the common enemy and attack it — the industry, the old way, the gurus, the system that failed them"
    when_to_use: "When you need to build deep rapport and trust quickly — especially with skeptical or burned audiences"
    best_for: [email sequences, lead magnets, community building, social content, VSL openings]
    example_application: "Email: 'You've always known something was off about traditional marketing (suspicions) → It's not your fault the gurus sold you tactics that don't work (failures) → Here's what the industry doesn't want you to know (enemies)'"

  - name: "7 Principles of Influence"
    creator: "Robert Cialdini"
    source: "Influence: The Psychology of Persuasion (1984), Pre-Suasion (2016)"
    steps:
      - step: "Reciprocity"
        detail: "Give value first — free content, free tools, free insights. The desire to reciprocate is hardwired"
      - step: "Commitment & Consistency"
        detail: "Get small yeses before asking for the big yes — micro-commitments, quizzes, opt-ins, surveys"
      - step: "Social Proof"
        detail: "Show that others like them have taken action — testimonials, numbers, case studies, logos, reviews"
      - step: "Authority"
        detail: "Establish credibility — credentials, media mentions, results, experience, association with known entities"
      - step: "Liking"
        detail: "Be relatable and likeable — similarity, compliments, shared values, humor, vulnerability"
      - step: "Scarcity"
        detail: "Create genuine urgency — limited time, limited spots, limited availability, disappearing bonuses"
      - step: "Unity"
        detail: "Create shared identity — 'We are the kind of people who...' In-group belonging and tribal connection"
    when_to_use: "Layer into any copy as persuasion amplifiers — not a standalone structure but principles to weave throughout"
    best_for: [all copy types, especially sales pages, emails, landing pages, ads]
    example_application: "Sales page: Free video training (reciprocity) → Quiz to qualify (commitment) → '50,000+ customers' (social proof) → Featured in Forbes (authority) → 'Only 100 spots' (scarcity)"

  - name: "STRONG Method"
    creator: "Oren Klaff"
    source: "Pitch Anything (2011)"
    steps:
      - step: "Set the Frame"
        detail: "Establish your frame as the dominant one — you are the prize, not the supplicant. Control the narrative context"
      - step: "Tell the Story"
        detail: "Use a compelling narrative that creates tension and intrigue — include a 'man in the jungle' moment of danger"
      - step: "Reveal the Intrigue"
        detail: "Introduce novelty and uniqueness — what makes this different from everything else they've seen"
      - step: "Offer the Prize"
        detail: "Position your offer as scarce and desirable — flip the dynamic so they're qualifying to work with you"
      - step: "Nail the Hookpoint"
        detail: "Create the moment where they lean in — the emotional peak where they mentally commit"
      - step: "Get the Decision"
        detail: "Push for a decision in the moment — time constraints, next steps, clear commitment"
    when_to_use: "High-stakes pitches where you need to control the frame — investor pitches, high-ticket sales, partnerships"
    best_for: [pitch decks, investor presentations, high-ticket sales calls, partnership proposals]
    example_application: "Investor pitch: Frame as exclusive opportunity → Origin story with near-death business moment → Novel technology reveal → 'We're selecting 3 investors' → Deadline for decision"

  - name: "Soap Opera Sequence"
    creator: "Andre Chaperon"
    source: "Autoresponder Madness (2009)"
    steps:
      - step: "Email 1: Set the Stage"
        detail: "Introduce yourself with vulnerability and intrigue — open a big curiosity loop that spans the entire sequence"
      - step: "Email 2: High Drama / Backstory"
        detail: "Tell the dramatic backstory — the struggle, the failure, the moment everything fell apart. End with cliffhanger"
      - step: "Email 3: Epiphany"
        detail: "Reveal the breakthrough moment — the realization that changed everything. Connect emotionally before revealing the solution"
      - step: "Email 4: Hidden Benefits"
        detail: "Show unexpected benefits and results — things they wouldn't have predicted. Stack value beyond the obvious"
      - step: "Email 5: Urgency / CTA"
        detail: "Create genuine urgency for action — deadline, disappearing bonuses, price increase, limited access. Close the loop"
    when_to_use: "Email welcome sequences and launch sequences where you need to build deep engagement over multiple touchpoints"
    best_for: [welcome sequences, launch emails, course enrollment, membership pitches]
    example_application: "Welcome sequence: 'I need to tell you something I've never shared publicly...' → 'The day I lost everything' → 'Then one morning at 3am...' → 'But here's what I didn't expect' → 'Doors close Friday at midnight'"

  - name: "Message Mining"
    creator: "Joanna Wiebe"
    source: "Copyhackers methodology / Copy School"
    steps:
      - step: "Gather Voice of Customer"
        detail: "Collect raw customer language — reviews, testimonials, support tickets, forum posts, survey responses, call transcripts"
      - step: "Highlight Emotional Phrases"
        detail: "Identify phrases with emotional charge — the words they use when describing their pain, desire, and transformation"
      - step: "Categorize by Theme"
        detail: "Group phrases into themes — recurring pain points, desires, objections, motivations, language patterns"
      - step: "Map to Page Sections"
        detail: "Assign the best phrases to specific copy locations — headlines, subheads, bullet points, CTAs, testimonials"
      - step: "Write Using Their Words"
        detail: "Write copy using their exact language as the foundation — not your clever phrasing, but their raw expression"
    when_to_use: "Before writing any copy — especially when you need to match the audience's awareness level and vocabulary"
    best_for: [landing pages, sales pages, email copy, ad copy, SaaS copy, product pages]
    example_application: "SaaS landing page: Mine G2 reviews for pain phrases → 'I was drowning in spreadsheets' becomes the headline → Feature descriptions use reviewer language verbatim"

  - name: "E5 Method"
    creator: "Todd Brown"
    source: "E5 Method training / Marketing Funnel Automation"
    steps:
      - step: "Engage"
        detail: "Hook with a big idea that's new, different, and counterintuitive — violate their existing beliefs immediately"
      - step: "Educate"
        detail: "Teach them the unique mechanism — why the old approach fails and why this new approach works differently"
      - step: "Excite"
        detail: "Build excitement through proof and possibility — case studies, demonstrations, specificity that makes it real"
      - step: "Exchange"
        detail: "Present the offer as a fair exchange — massive value for relatively small investment, supported by guarantees"
      - step: "Execute"
        detail: "Drive immediate action — specific next step, urgency driver, removal of remaining friction"
    when_to_use: "Marketing campaigns and funnels built around a big idea — particularly info products and coaching"
    best_for: [VSLs, webinars, sales pages, launch sequences, advertorials]
    example_application: "VSL: 'Scientists just discovered a new compound...' (engage) → 'Here's why diets fail at the cellular level' (educate) → Case studies (excite) → Program details (exchange) → 'Enroll now' (execute)"

  - name: "16-Word Sales Letter"
    creator: "Evaldo Albuquerque"
    source: "The 16-Word Sales Letter (2019)"
    steps:
      - step: "Identify the Belief"
        detail: "Find the ONE false belief that, if changed, makes the sale inevitable. Not the problem — the belief about the problem"
      - step: "Write the 16-Word Framework"
        detail: "Structure: '[Desired outcome] is not about [false belief]. It's about [new belief/mechanism].' This is the spine of the entire sales letter"
      - step: "Build the Lead"
        detail: "Open with the type of lead that matches audience awareness — direct, indirect, story, proclamation, secret, or prediction"
      - step: "Shatter the False Belief"
        detail: "Systematically dismantle the old belief using logic, stories, analogies, and proof. Make the old way seem obviously wrong"
      - step: "Install the New Belief"
        detail: "Replace with the new belief tied to your unique mechanism — the thing that makes your solution the inevitable choice"
    when_to_use: "Long-form sales letters and VSLs — especially in competitive markets where differentiation through belief is key"
    best_for: [sales letters, VSLs, advertorials, health/finance/biz-opp markets]
    example_application: "Health VSL: 'Losing weight is NOT about eating less and exercising more (false belief). It's about resetting your metabolic thermostat (new belief/mechanism).'"

  - name: "CopyTHINKING"
    creator: "Ry Schwartz"
    source: "CopyHackers / CopyTHINKING email training"
    steps:
      - step: "Map Awareness Levels"
        detail: "Plot where your subscriber is on Schwartz's awareness spectrum — unaware, problem-aware, solution-aware, product-aware, most-aware"
      - step: "Match Emotional Temperature"
        detail: "Match the emotional state of the reader at each awareness level — frustration, hope, skepticism, urgency"
      - step: "Choose Awareness Shift"
        detail: "Each email moves the reader ONE level forward on the awareness spectrum — never try to jump multiple levels"
      - step: "Apply Sequence Architecture"
        detail: "Structure the sequence so each email logically flows to the next, building the case incrementally"
      - step: "Close at Product-Aware"
        detail: "Only pitch when they've reached product-aware — the sequence earns the right to sell through progressive awareness building"
    when_to_use: "Email sequences where you need to move subscribers through awareness levels before selling"
    best_for: [email sequences, nurture campaigns, launch sequences, SaaS onboarding emails]
    example_application: "SaaS email sequence: E1 (problem-aware → agitate pain) → E2 (solution-aware → show category) → E3 (product-aware → introduce your tool) → E4 (most-aware → deal/deadline)"

  - name: "Fascination Bullet Method"
    creator: "Clayton Makepeace / Gary Bencivenga"
    source: "Makepeace's Total Package, Bencivenga's Persuasion Seminar"
    steps:
      - step: "Identify the Payoff"
        detail: "Start with the specific benefit or secret — the thing the reader will learn, gain, or discover"
      - step: "Add Specificity"
        detail: "Include numbers, names, details — 'The 3-minute morning ritual' beats 'A morning routine'"
      - step: "Create Curiosity Gap"
        detail: "Hint at the information without revealing it — create an itch that can only be scratched by buying"
      - step: "Use Power Templates"
        detail: "Templates: 'How to [benefit] without [pain]', 'The [number] [thing] that [result]', 'Why [common thing] is [surprising truth]', 'What [experts] know about [topic] that you don't'"
      - step: "Stack for Momentum"
        detail: "Group 5-7 bullets in a block, mixing benefit-driven and curiosity-driven. Each bullet should be strong enough to sell on its own"
    when_to_use: "Bullet sections in sales letters, email teasers, opt-in page benefit lists, VSL mid-sections"
    best_for: [sales letters, VSLs, opt-in pages, email teasers, Amazon listings, course curriculum descriptions]
    example_application: "Sales letter bullets: '• The 11-cent kitchen ingredient that dissolves stubborn belly fat (page 23) • Why your doctor will NEVER tell you about this FDA-approved alternative • 3 foods marketed as healthy that are silently destroying your thyroid'"

  - name: "USP Framework"
    creator: "Rosser Reeves"
    source: "Reality in Advertising (1961)"
    steps:
      - step: "Identify Unique Claim"
        detail: "Find the ONE proposition your competitor cannot or does not offer — it must be unique to you"
      - step: "Verify Customer Value"
        detail: "The claim must be something the customer actually wants — not just unique, but uniquely valuable"
      - step: "Make it Specific"
        detail: "Quantify and specify — 'Melts in your mouth, not in your hands' is specific. 'Great quality' is not"
      - step: "Test Memorability"
        detail: "The USP must be simple enough to remember and repeat — if it can't fit in one sentence, it's too complex"
      - step: "Build All Copy Around It"
        detail: "Every ad, every page, every email reinforces the USP — consistency creates penetration"
    when_to_use: "Brand positioning, new product launches, entering competitive markets, differentiating commoditized offers"
    best_for: [brand copy, taglines, elevator pitches, ad campaigns, landing page headlines]
    example_application: "SaaS positioning: Audit competitors → Find that none offer real-time collaboration → USP: 'The only project tool where your entire team edits simultaneously — zero lag, zero conflicts' → Build all copy around this"

  - name: "Tactical Empathy Framework"
    creator: "Chris Voss"
    source: "Never Split the Difference (2016)"
    steps:
      - step: "Mirror"
        detail: "Repeat the last 1-3 critical words of what the prospect said — it triggers elaboration and shows you're listening"
      - step: "Label the Emotion"
        detail: "Name what they're feeling — 'It seems like you're frustrated with...' or 'It sounds like you feel...'"
      - step: "Accusation Audit"
        detail: "Proactively list every negative thing they might think about you — 'You're probably thinking this is too expensive, too good to be true, just another guru...' Disarms them"
      - step: "Calibrated Questions"
        detail: "Ask 'How' and 'What' questions that make them solve your problem — 'How would you like to handle this? What would make this work for you?'"
      - step: "That's Right"
        detail: "Push for a 'that's right' response by summarizing their situation so accurately they confirm it — this is deeper than 'yes'"
    when_to_use: "Sales calls, DM selling, objection handling in copy, refund prevention, partnership negotiations"
    best_for: [sales scripts, objection handling copy, FAQ sections, chatbot scripts, customer success]
    example_application: "Sales call script: 'So you've tried three agencies and none delivered? (mirror) → It sounds like you feel burned (label) → You're probably thinking why would this be different (audit) → What would success look like for you? (calibrated)'"

  - name: "Frame Control"
    creator: "Oren Klaff"
    source: "Pitch Anything (2011), Flip the Script (2019)"
    steps:
      - step: "Identify the Dominant Frame"
        detail: "Recognize the existing frame — who currently controls the narrative? Is it the buyer's frame, the market's frame, or yours?"
      - step: "Set Your Frame"
        detail: "Establish your frame before engagement — you are the prize, the expert, the authority. Not the supplicant"
      - step: "Use Frame Collisions"
        detail: "When frames clash, the stronger one absorbs the weaker. Use humor, status, or moral authority to win frame collisions"
      - step: "Apply Time Pressure"
        detail: "Control the clock — 'I have 15 minutes' establishes your time as valuable and creates urgency"
      - step: "Prize Frame"
        detail: "Position yourself as the prize — 'We're selective about who we work with' flips the buyer-seller dynamic"
    when_to_use: "High-ticket sales, negotiations, pitch situations, any context where status dynamics affect the outcome"
    best_for: [pitch decks, high-ticket sales pages, agency proposals, premium brand copy]
    example_application: "Agency pitch: 'We only take on 3 new clients per quarter → Here's why our last client said no to us first → We turned down $2M in projects last year → If this is a fit, here's what happens next'"

  - name: "Persuasion Equation"
    creator: "Multiple contributors (synthesized framework)"
    source: "Derived from Cialdini, Sugarman, Schwartz, and behavioral economics"
    steps:
      - step: "Urgency + Scarcity"
        detail: "Why now? Limited time, limited spots, rising prices, closing doors — create temporal pressure"
      - step: "Authority + Social Proof"
        detail: "Why trust? Credentials, media, testimonials, case studies, numbers — establish credibility"
      - step: "Desire + Future Pacing"
        detail: "Why want? Paint the outcome vividly, make them feel the after-state, engage emotions"
      - step: "Logic + Justification"
        detail: "Why rational? Cost comparison, ROI calculation, logical argument — give the brain permission to buy what the heart already wants"
      - step: "Risk Reversal"
        detail: "Why safe? Guarantee, trial, refund policy, social proof of safety — remove the last barrier"
    when_to_use: "Closing sections of any sales copy — layer these elements to create irresistible buy pressure"
    best_for: [sales page closes, checkout pages, email closes, webinar closes, cart abandonment]
    example_application: "Sales page close: 'Only 47 spots remain (scarcity) → Featured in Inc, Forbes, Entrepreneur (authority) → Imagine 6 months from now... (desire) → At $997 this is less than $3.30/day (logic) → Full 365-day guarantee (risk reversal)'"
