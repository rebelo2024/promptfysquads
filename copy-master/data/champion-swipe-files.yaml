    writer: "Ry Schwartz"
    product: "Various SaaS and info-product clients"
    year: 2018
    revenue: "Millions across client campaigns"
    key_technique: "CopyTHINKING awareness-based sequences — each email deliberately moved subscribers one awareness level forward"
    why_it_worked: "Never tried to sell before the subscriber was product-aware. Each email did exactly one job. The precision of awareness matching dramatically improved conversion"

ads:

  - title: "Rolls-Royce (At 60 Miles an Hour)"
    writer: "David Ogilvy"
    product: "Rolls-Royce Silver Cloud"
    year: 1958
    revenue: "Sold out production; defined luxury car advertising"
    key_technique: "Factual headline — let a specific, verifiable fact do the selling instead of adjectives or claims"
    why_it_worked: "In a world of superlatives, a fact was the ultimate pattern interrupt. The specificity of the clock detail was more impressive than any claim"

  - title: "Think Small (Volkswagen)"
    writer: "Julian Koenig / Helmut Krone — DDB"
    product: "Volkswagen Beetle"
    year: 1959
    revenue: "Made VW America's top import; $100M+ in attributed sales"
    key_technique: "Contrarian positioning — in an era of fins and chrome, celebrated smallness. Massive white space with tiny car"
    why_it_worked: "Honesty was revolutionary in advertising. Admitting you're small when everyone else is bragging about size created instant differentiation and trust"

  - title: "Lemon (Volkswagen)"
    writer: "Julian Koenig / Rita Selden — DDB"
    product: "Volkswagen Beetle"
    year: 1960
    revenue: "Part of most successful car campaign in history"
    key_technique: "Self-deprecating headline — calling your own car a 'lemon' was unheard of. The body revealed it was rejected by QC for a minor flaw"
    why_it_worked: "The shock of self-criticism created trust. If they rejected a car for a tiny scratch on a chrome strip, imagine their standards for everything else"

  - title: "The Man in the Hathaway Shirt"
    writer: "David Ogilvy"
    product: "Hathaway shirts"
    year: 1951
    revenue: "Built Hathaway into a national brand overnight"
    key_technique: "Visual story device — the eye patch on an otherwise ordinary man created intrigue and brand identity"
    why_it_worked: "A $1.50 eye patch created a $1M+ brand campaign. The visual anomaly demanded attention and created a character people wanted to know more about"

  - title: "Avis: We Try Harder"
    writer: "Paula Green — DDB"
    product: "Avis car rental"
    year: 1962
    revenue: "Took Avis from $3.2M loss to $1.2M profit in one year"
    key_technique: "Underdog positioning — admitted being #2 and made it a virtue"
    why_it_worked: "Vulnerability was a competitive weapon. Being #2 meant they had to try harder, which positioned every interaction as superior service"

  - title: "1,000 Songs in Your Pocket"
    writer: "Apple / TBWA\\Chiat\\Day"
    product: "iPod"
    year: 2001
    revenue: "Part of $50B+ iPod/iTunes ecosystem"
    key_technique: "Benefit, not feature — not '5GB storage' but '1,000 songs in your pocket'"
    why_it_worked: "Translated a technical spec into an emotional benefit. '1,000 songs' is tangible. 'In your pocket' is freedom. No jargon"

  - title: "Got Milk?"
    writer: "Jeff Goodby / Goodby Silverstein"
    product: "California Milk Processor Board"
    year: 1993
    revenue: "Reversed milk consumption decline; became cultural phenomenon"
    key_technique: "Deprivation positioning — showed what life is like WITHOUT milk rather than extolling its virtues"
    why_it_worked: "Loss aversion. The cookie-without-milk scenario was more persuasive than any nutritional claim. The two-word question became a cultural meme"

  - title: "Just Do It"
    writer: "Dan Wieden — Wieden+Kennedy"
    product: "Nike"
    year: 1988
    revenue: "Nike grew from $877M to $9.2B in next decade"
    key_technique: "Aspirational command — three words that captured the emotional essence of athletic determination"
    why_it_worked: "Universal applicability. Works for running, business, life. The imperative tone was both a challenge and permission. Aligned with Nike's identity perfectly"

  - title: "Where's the Beef?"
    writer: "Cliff Freeman"
    product: "Wendy's"
    year: 1984
    revenue: "Revenue increased 31% the year it ran"
    key_technique: "Competitive attack through humor — old lady questions the substance of competitor burgers"
    why_it_worked: "Humor made it shareable (before social media). The question implied competitors were all style, no substance. Became a cultural catchphrase"

  - title: "Absolut Vodka Bottle Campaign"
    writer: "TBWA"
    product: "Absolut Vodka"
    year: 1981
    revenue: "Grew from 10K cases to 4.5M cases/year"
    key_technique: "Visual consistency — every ad featured the bottle shape in creative contexts. 1,500 different executions over 25 years"
    why_it_worked: "Repetition with variation. The format was immediately recognizable but never boring. Collectors saved the ads, turning advertising into art"

  - title: "Dollar Shave Club Launch Video"
    writer: "Michael Dubin"
    product: "Dollar Shave Club"
    year: 2012
    revenue: "$1B Unilever acquisition"
    key_technique: "Deadpan humor + clear value prop in 90 seconds — 'Our blades are f***ing great' with a $1/month offer"
    why_it_worked: "Humor cut through Gillette's multi-billion dollar advertising. The price anchor ($1) was shocking. The personality made the brand shareable. 12M views in 48 hours"
