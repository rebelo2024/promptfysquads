workflow:
  id: wf-full-copy-project
  name: "Projeto Completo de Copy Master"
  version: "2.0.0"
  description: |
    Workflow completo de projeto de copywriting de ponta a ponta com 32 agentes
    especialistas e camada de psicologia da persuasao. Conduz um creative brief
    pela atribuicao de especialista, escrita, checkpoint de psicologia (Cialdini/Warren),
    revisao do Copy Master Chief e entrega final.
  trigger: "*full-copy-project"
  entry_agent: copy-master-chief
  estimated_duration: "30-60 minutes"
  type: sequential
  sequence:
    - agent: copy-master-chief
      action: diagnose
      creates: diagnosis
    - agent: copy-master-chief
      action: assign-specialist
      creates: assignment_brief
    - agent: "{assigned_specialist}"
      action: write-copy
      creates: draft_copy
    - agent: copy-master-chief
      action: psychology-checkpoint
      creates: psychology_audit
    - agent: copy-master-chief
      action: critique
      creates: critique_report
    - agent: copy-master-chief
      action: review
      creates: final_copy

phases:
  - id: phase_0
    name: "Brief and Diagnosis"
    agent: copy-master-chief
    task: diagnose.md
    description: "Copy Master Chief receives the project brief, diagnoses the request, identifies copy type, awareness level, and selects the best specialist from 32 agents across 27 domains."
    outputs:
      - diagnosis: "markdown"
      - assigned_specialist: "agent-id"
      - copy_type: "string"
    checkpoint:
      gate: "Specialist identified with HIGH confidence"
      veto: "Ambiguous brief — request clarification before proceeding"

  - id: phase_1
    name: "Specialist Assignment"
    agent: copy-master-chief
    task: diagnose.md
    depends_on: [phase_0]
    description: "Copy Master Chief formally assigns the project to the selected specialist with the brief, audience data, awareness level, and any reference material."
    outputs:
      - assignment_brief: "markdown"
    checkpoint:
      gate: "Specialist acknowledged with clear deliverables"
      veto: "Specialist mismatch for the copy type"

  - id: phase_2
    name: "Copy Production"
    agent: "{assigned_specialist}"
    task: "{matched_task}"
    depends_on: [phase_1]
    description: "The assigned specialist writes the copy using their signature methodology. Task is dynamically selected based on copy type: write-headline.md, write-sales-letter.md, write-vsl-script.md, write-email-sequence.md, write-ad-copy.md, write-landing-page.md, create-funnel-copy.md, write-bullets.md, create-offer.md, write-webinar-script.md, or write-pitch-deck.md. Each task includes the Psychological Layer phase with Cialdini and Warren principles."
    outputs:
      - draft_copy: "markdown"
    checkpoint:
      gate: "Draft complete with all required sections per task format including Psychological Layer"
      veto: "Draft missing critical sections, off-brief, or missing persuasion psychology mapping"

  - id: phase_3
    name: "Psychology Checkpoint"
    agent: copy-master-chief
    task: review.md
    depends_on: [phase_2]
    description: "Copy Master Chief verifies the persuasion psychology layer is properly applied. Checks that at minimum 3 Cialdini principles are active, 2 Warren levers are engaged, and principles are woven naturally (not bolted on). For offers, validates the Hormozi Value Equation."
    outputs:
      - psychology_audit: "markdown"
      - psychology_pass: "boolean"
    checkpoint:
      gate: "Minimum 3 Cialdini principles active AND 2 Warren levers engaged"
      veto: "Fewer than 3 Cialdini principles OR principles applied deceptively"

  - id: phase_4
    name: "Chief Critique"
    agent: copy-master-chief
    task: critique-copy.md
    depends_on: [phase_3]
    description: "Copy Master Chief reviews the draft using the enhanced 8-point critique framework plus persuasion psychology audit. Scores, identifies issues, and determines if the copy is ready for delivery or needs revision."
    outputs:
      - critique_report: "markdown"
      - verdict: "string"
    checkpoint:
      gate: "Composite score >= 60% (Strong or Elite verdict) AND psychology checkpoint passed"
      veto: "Composite score < 40% — specialist must rewrite"

  - id: phase_5
    name: "Final Delivery"
    agent: copy-master-chief
    task: review.md
    depends_on: [phase_4]
    description: "Copy Master Chief compiles the final deliverable package with the approved copy, critique notes, persuasion architecture documentation, and usage recommendations."
    outputs:
      - final_copy: "markdown"
      - usage_notes: "markdown"
      - persuasion_architecture: "markdown"
    checkpoint:
      gate: "Client-ready package with all deliverables including persuasion mapping"
      veto: "Unresolved critique issues still open"

completion_criteria:
  - "Brief diagnosed and specialist assigned from 32-agent roster"
  - "Copy produced by the right specialist using the right methodology"
  - "Psychology checkpoint passed (Cialdini + Warren + Hormozi where applicable)"
  - "Chief critique passed with Strong or Elite verdict"
  - "Final package delivered with usage notes and persuasion architecture"
